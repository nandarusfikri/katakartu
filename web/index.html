<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kartu Kata - Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Kartu Kata</h1>
            <p class="tagline">Gabungkan suku kata menjadi kata valid</p>
        </header>

        <main id="app">
            <section id="screen-landing" class="screen active">
                <div class="card landing-card">
                    <button class="btn btn-primary" onclick="showScreen('create')">
                        Buat Room
                    </button>
                    <button class="btn btn-secondary" onclick="showScreen('join')">
                        Join Room
                    </button>
                </div>
            </section>

            <section id="screen-create" class="screen">
                <div class="card">
                    <h2>Buat Room Baru</h2>
                    <div class="form-group">
                        <label for="create-username">Nama kamu</label>
                        <input type="text" id="create-username" placeholder="Masukkan nama" maxlength="20">
                    </div>
                    <div class="form-group">
                        <label for="create-duration">Durasi Permainan</label>
                        <div class="duration-options" id="duration-options">
                            <button class="duration-btn" data-duration="120" onclick="selectDuration(120)">2 Menit</button>
                            <button class="duration-btn selected" data-duration="180" onclick="selectDuration(180)">3 Menit</button>
                            <button class="duration-btn" data-duration="300" onclick="selectDuration(300)">5 Menit</button>
                        </div>
                    </div>
                    <button class="btn btn-primary" onclick="createRoom()">
                        Buat Room
                    </button>
                    <button class="btn btn-text" onclick="showScreen('landing')">
                        Kembali
                    </button>
                </div>
            </section>

            <section id="screen-join" class="screen">
                <div class="card">
                    <h2>Join Room</h2>
                    <div class="form-group">
                        <label for="join-username">Nama kamu</label>
                        <input type="text" id="join-username" placeholder="Masukkan nama" maxlength="20">
                    </div>
                    <div class="form-group">
                        <label for="join-code">Kode Room</label>
                        <input type="text" id="join-code" placeholder="ABCD" maxlength="4" style="text-transform: uppercase;">
                    </div>
                    <button class="btn btn-primary" onclick="joinRoom()">
                        Join
                    </button>
                    <button class="btn btn-text" onclick="showScreen('landing')">
                        Kembali
                    </button>
                </div>
            </section>

            <section id="screen-lobby" class="screen">
                <div class="card">
                    <div class="room-info">
                        <span class="label">Kode Room</span>
                        <div class="room-code-wrapper">
                            <span id="lobby-room-code" class="room-code">----</span>
                            <button class="copy-btn" onclick="copyRoomCode()" title="Copy room code">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="players-list">
                        <h3>Pemain (<span id="player-count">0</span>/6)</h3>
                        <ul id="players-list"></ul>
                    </div>
                    <button id="btn-start" class="btn btn-primary" onclick="startGame()" disabled>
                        Mulai Game
                    </button>
                    <button class="btn btn-text" onclick="disconnect()">
                        Keluar
                    </button>
                </div>
            </section>

            <section id="screen-game" class="screen">
            <div class="game-area">
                <div class="leaderboard-compact">
                    <span class="trophy-icon">🏆</span>
                    <div id="leaderboard-list" class="leaderboard-list-compact"></div>
                </div>

                <div id="vote-popup" class="vote-popup hidden">
                    <div class="vote-header">
                        <span class="vote-title">Voting Ganti Main Card</span>
                        <span class="vote-timer" id="vote-timer">5</span>
                    </div>
                    <div class="vote-info">
                        <span id="vote-initiator"></span> ingin ganti main card
                    </div>
                    <div class="vote-progress">
                        <span class="vote-approve" id="vote-approve">✓ 0</span>
                        <span class="vote-reject" id="vote-reject">✗ 0</span>
                    </div>
                    <div class="vote-buttons">
                        <button class="btn btn-approve" onclick="submitVote(true)">Approve</button>
                        <button class="btn btn-reject" onclick="submitVote(false)">Reject</button>
                    </div>
                </div>

                <div class="word-preview">
                    <span class="preview-prefix" id="preview-prefix"></span>
                    <span class="preview-main" id="main-card">--</span>
                    <span class="preview-suffix" id="preview-suffix"></span>
                </div>

                <div class="drop-zones">
                    <div class="drop-zone prefix-zone" id="prefix-zone" data-zone="prefix">
                        <span class="drop-label">DEPAN</span>
                    </div>

                    <div class="main-card-display">

                        <div class="room-timer">
                            <span id="timer-display">5:00</span>
                        </div>
                        <span class="label">Main Card</span>
                        <div id="main-card-display" class="card-large">--</div>
                    </div>

                    <div class="drop-zone suffix-zone" id="suffix-zone" data-zone="suffix">
                        <span class="drop-label">BELAKANG</span>
                    </div>
                </div>

                    <div class="actions">
                        <button class="btn btn-secondary btn-sm" onclick="drawCard()">
                            Ambil
                        </button>
                        <button class="btn btn-primary btn-sm" id="btn-submit" onclick="submitPlay()" disabled>
                            Submit
                        </button>
                        <button class="btn btn-secondary btn-sm" onclick="clearSelection()">
                            Reset
                        </button>
                    </div>

                    <div class="hand-area">
                        <span class="label">Kartu Kamu</span>
                        <div id="player-hand" class="hand-cards" data-zone="hand"></div>
                    </div>
                </div>
            </section>
        </main>

        <div id="toast" class="toast hidden"></div>

        <div id="answer-popup" class="answer-popup hidden">
            <div class="answer-popup-content">
                <div id="answer-popup-text" class="answer-popup-text"></div>
            </div>
        </div>

        <div id="words-modal" class="modal hidden">
            <div class="modal-content">
                <span class="close" onclick="closeWords()">&times;</span>
                <h2>Daftar Kata Baku</h2>
                <div id="words-list" class="words-list"></div>
            </div>
        </div>
    </div>

    <audio id="correct-sound" preload="auto">
        <source src="sounds/correct.mp3" type="audio/mpeg">
    </audio>
    <audio id="draw-card-sound" preload="auto">
        <source src="sounds/jokowi-saya-akan-lawan.mp3" type="audio/mpeg">
    </audio>
    <audio id="score-50-sound" preload="auto">
        <source src="sounds/hidup-jokowi.mp3" type="audio/mpeg">
    </audio>
    <audio id="wrong-sound" preload="auto">
        <source src="sounds/mac-quack.mp3" type="audio/mpeg">
    </audio>
    <script src="app.js"></script>
</body>
</html>
